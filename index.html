<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wellness Wheel</title>
<meta name="description" content="Map your wellness across life's pillars — score, color, and share your wheel.">
<style>
  :root {
    color-scheme: light;
    /* retro vaporwave UI-kit palette */
    --brown: #43301f;      /* outlines & ink */
    --cream: #f6efdd;      /* window bodies */
    --cream-2: #fffbf0;    /* fields */
    --pink: #ef9aa9;       /* chart window title bar */
    --yellow: #f4c95d;     /* settings title bar */
    --star: #f2c14e;
    --heart: #d94f2b;
  }
  * { box-sizing: border-box; margin: 0; }

  body {
    /* the desktop: smooth lavender → pink, crisp elements on top */
    background: linear-gradient(115deg, #b7b0e8, #eeb4ce 60%, #f2bccb);
    background-attachment: fixed;
    color: var(--brown);
    font-family: "Courier New", Courier, monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 30px 18px 50px;
  }
  .wrap { max-width: 1060px; margin: 0 auto; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 22px; align-items: start; }
  @media (max-width: 840px) { .layout { grid-template-columns: 1fr; } }

  /* window chrome: flat cream, brown outline, solid offset shadow */
  .window {
    background: var(--cream);
    border: 2px solid var(--brown);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 6px 7px 0 rgba(67, 48, 31, .3);
  }
  .titlebar {
    display: flex; align-items: center; gap: 7px;
    color: var(--brown); font-weight: bold; font-size: 13px;
    padding: 5px 10px;
    border-bottom: 2px solid var(--brown);
    user-select: none;
  }
  .titlebar.pink { background: var(--pink); }
  .titlebar.yellow { background: var(--yellow); }
  .t-btns { margin-left: auto; flex: none; letter-spacing: 5px; font-weight: bold; }
  .win-body { padding: 14px; }

  /* the diagram sits on white behind a brown outline */
  .canvas-panel {
    background: #fff;
    border: 2px solid var(--brown);
    border-radius: 5px;
    padding: 10px;
  }
  #chart { display: block; width: 100%; height: auto; }

  /* editable title inside the chart window's title bar */
  #title-input {
    flex: 1; min-width: 0;
    font: bold 13px "Courier New", Courier, monospace;
    color: var(--brown); background: transparent;
    border: none; outline: none;
    padding: 0;
  }
  #title-input::placeholder { color: rgba(67,48,31,.55); }

  .topline { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .stat { display: flex; align-items: baseline; gap: 7px; }
  .stat .value { font-size: 27px; font-weight: bold; }
  .stat .label { font-size: 11px; }
  .color-pick { display: flex; align-items: center; gap: 7px; font-size: 12px; }
  input[type="color"] {
    width: 34px; height: 26px; padding: 1px; cursor: pointer;
    background: var(--cream-2);
    border: 2px solid var(--brown); border-radius: 5px;
    -webkit-appearance: none; appearance: none;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  .pillars { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .pillars li { display: flex; align-items: center; gap: 7px; }
  .pillars .name { flex: 1; min-width: 0; }
  .pillars span.name { font-weight: bold; padding: 3px 0; }
  .pillars input.name {
    font: 13px "Courier New", Courier, monospace;
    color: var(--brown);
    background: var(--cream-2);
    border: 2px solid var(--brown); border-radius: 5px;
    padding: 3px 6px; outline: none;
  }
  .pillars input.name:focus { background: #fff; }

  /* star ratings — click the nth star; click it again to clear to 0 */
  .stars { display: flex; flex: none; }
  .star {
    background: none; border: none; cursor: pointer;
    font-size: 19px; line-height: 1; padding: 0 1px;
    color: var(--brown);
  }
  .star.filled {
    color: var(--star);
    -webkit-text-stroke: 1.2px var(--brown);
  }

  /* raised cream buttons with solid offset shadow, pressed-in on click */
  .pcbtn {
    background: var(--cream-2); color: var(--brown);
    border: 2px solid var(--brown); border-radius: 5px;
    cursor: pointer;
    font: bold 12px "Courier New", Courier, monospace;
    box-shadow: 2px 3px 0 rgba(67, 48, 31, .55);
  }
  .pcbtn:active { transform: translate(2px, 3px); box-shadow: none; }
  .pcbtn:disabled { opacity: .45; cursor: default; box-shadow: none; }

  .rm { width: 24px; height: 24px; flex: none; font-size: 12px; line-height: 1; padding: 0; }
  .spacer { width: 24px; flex: none; }

  #add-pillar { margin-top: 14px; padding: 6px 12px; }

  .actions { display: flex; gap: 9px; margin-top: 16px; }
  .actions .pcbtn {
    width: 42px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .actions svg { width: 17px; height: 17px; display: block; }

  .statusbar {
    margin-top: 16px;
    padding: 4px 9px;
    font-size: 11px;
    background: var(--cream-2);
    border: 2px solid var(--brown); border-radius: 5px;
  }
  .statusbar .heart { color: var(--heart); }

  #toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
    background: var(--cream); color: var(--brown);
    font: bold 12px "Courier New", Courier, monospace;
    padding: 8px 14px;
    border: 2px solid var(--brown); border-radius: 5px;
    box-shadow: 3px 4px 0 rgba(67, 48, 31, .4);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="layout">

    <div class="window">
      <div class="titlebar pink">
        <span class="heart" style="color:#d94f2b" aria-hidden="true">♥</span>
        <input id="title-input" placeholder="my wellness wheel" aria-label="Chart title" maxlength="60">
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="canvas-panel">
          <svg id="chart" viewBox="0 0 840 640" role="img" aria-label="Wellness spider chart"></svg>
        </div>
      </div>
    </div>

    <div class="window">
      <div class="titlebar yellow">
        <span>wellness.exe</span>
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="topline">
          <div class="stat">
            <span class="value" id="avg">–</span>
            <span class="label">overall / 5</span>
          </div>
          <label class="color-pick">color
            <input type="color" id="color-input" aria-label="Chart color">
          </label>
        </div>
        <ul class="pillars" id="pillar-list"></ul>
        <button class="pcbtn" id="add-pillar">+ add pillar</button>
        <div class="actions">
          <button class="pcbtn" id="copy-link" title="Copy share link" aria-label="Copy share link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="pcbtn" id="share" hidden title="Share" aria-label="Share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
          <button class="pcbtn" id="download" title="Download PNG" aria-label="Download PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="pcbtn" id="reset" title="Reset" aria-label="Reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>
        <div class="statusbar"><span class="heart">♥</span> 0 = struggling · 5 = thriving <span class="heart">♥</span></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
(() => {
  "use strict";

  // ---------- theme: always light — explicit values so SVG serializes correctly for PNG export ----------
  const THEME = { surface:"#ffffff", ink:"#43301f", ink2:"#6b5138", muted:"#a8906e",
                  grid:"#e9dfc9", fillAlpha:0.18 };
  const FONT = "'Courier New', Courier, monospace";
  const rgba = (hex, a) => {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${n >> 16 & 255},${n >> 8 & 255},${n & 255},${a})`;
  };

  // ---------- state ----------
  const DEFAULT_COLOR = "#ef9aa9";
  const STORE_KEY = "wellness-wheel-v2";
  const FIXED = ["Mental Health", "Physical Health", "Sociability"];
  const MAX_PILLARS = 7, MAX_VAL = 5;

  function defaults() {
    return {
      title: "",
      color: DEFAULT_COLOR,
      pillars: FIXED.map(name => ({ name, value: 3 }))
    };
  }
  // The three fixed pillars always occupy slots 0-2 (matched by name if the
  // incoming data has them); everything else becomes an extra, capped at 7 total.
  function sanitize(s) {
    const color = /^#[0-9a-fA-F]{6}$/.test(s.color || "") ? s.color : DEFAULT_COLOR;
    const clampV = v => Math.round(Math.min(MAX_VAL, Math.max(0, Number(v) || 0)));
    const incoming = (Array.isArray(s.pillars) ? s.pillars : []).map(p => ({
      name: String(p.name || "Pillar").slice(0, 24),
      value: clampV(p.value)
    }));
    const pillars = FIXED.map(name => {
      const i = incoming.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
      return { name, value: i >= 0 ? incoming.splice(i, 1)[0].value : 3 };
    });
    return {
      title: String(s.title || "").slice(0, 60),
      color,
      pillars: pillars.concat(incoming.slice(0, MAX_PILLARS - FIXED.length))
    };
  }
  function load() {
    // URL hash wins (a shared wheel), then this browser's saved wheel, then defaults.
    const fromHash = decodeHash(location.hash);
    if (fromHash) return fromHash;
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return sanitize(JSON.parse(raw));
    } catch (e) { /* corrupted storage — fall through */ }
    return defaults();
  }
  function encodeHash(s) {
    const json = JSON.stringify([s.title, s.color, s.pillars.map(p => [p.name, p.value])]);
    return "#" + btoa(String.fromCharCode(...new TextEncoder().encode(json)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function decodeHash(hash) {
    if (!hash || hash.length < 2) return null;
    try {
      const b64 = hash.slice(1).replace(/-/g, "+").replace(/_/g, "/");
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const parsed = JSON.parse(new TextDecoder().decode(bytes));
      // current format: [title, color, rows] — older links: [title, rows]; extra row fields ignored
      const [title, color, rows] = parsed.length === 3 ? parsed : [parsed[0], DEFAULT_COLOR, parsed[1]];
      if (!Array.isArray(rows)) return null;
      return sanitize({ title, color, pillars: rows.map(([name, value]) => ({ name, value })) });
    } catch (e) { return null; }
  }
  function persist() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
    history.replaceState(null, "", encodeHash(state));
  }

  let state = load();

  // ---------- chart ----------
  const svg = document.getElementById("chart");
  const NS = "http://www.w3.org/2000/svg";
  const CX = 420, CY = 320, R = 200, LABEL_R = R + 40;

  const angle = i => -Math.PI / 2 + (i * 2 * Math.PI) / state.pillars.length;
  const pt = (i, v) => {
    const a = angle(i), r = (v / MAX_VAL) * R;
    return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
  };
  const el = (tag, attrs) => {
    const n = document.createElementNS(NS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  };

  function renderChart() {
    const t = THEME;
    const series = state.color;
    svg.textContent = "";
    const N = state.pillars.length;

    // grid rings (spider polygons) at 1..5 + spokes — recessive hairlines
    for (let v = 1; v <= MAX_VAL; v++) {
      const pts = state.pillars.map((_, i) => pt(i, v).join(",")).join(" ");
      svg.appendChild(el("polygon", { points: pts, fill: "none", stroke: t.grid, "stroke-width": 1.2 }));
    }
    for (let i = 0; i < N; i++) {
      const [x, y] = pt(i, MAX_VAL);
      svg.appendChild(el("line", { x1: CX, y1: CY, x2: x, y2: y, stroke: t.grid, "stroke-width": 1.2 }));
    }
    // ring value labels along the top spoke
    for (let v = 1; v <= MAX_VAL; v++) {
      const lbl = el("text", { x: CX + 9, y: CY - (v / MAX_VAL) * R + 4, fill: t.muted,
        "font-size": 12, "font-family": FONT });
      lbl.textContent = v;
      svg.appendChild(lbl);
    }

    // data polygon
    const poly = state.pillars.map((p, i) => pt(i, p.value).join(",")).join(" ");
    svg.appendChild(el("polygon", { points: poly, fill: rgba(series, t.fillAlpha), stroke: series,
      "stroke-width": 3, "stroke-linejoin": "round" }));

    // vertices
    state.pillars.forEach((p, i) => {
      const [x, y] = pt(i, p.value);
      svg.appendChild(el("circle", { cx: x, cy: y, r: 6.5, fill: t.surface,
        stroke: series, "stroke-width": 3 }));
    });

    // pillar labels (name + value) — ink tokens, never series color
    state.pillars.forEach((p, i) => {
      const a = angle(i);
      const x = CX + LABEL_R * Math.cos(a), y = CY + LABEL_R * Math.sin(a);
      const cos = Math.cos(a), sin = Math.sin(a);
      const anchor = Math.abs(cos) < 0.3 ? "middle" : cos > 0 ? "start" : "end";
      const dy = sin > 0.85 ? 18 : sin < -0.85 ? -10 : 6;
      const g = el("text", { x, y: y + dy, "text-anchor": anchor, fill: t.ink2,
        "font-size": 17, "font-family": FONT });
      const name = document.createElementNS(NS, "tspan");
      name.textContent = p.name;
      const val = el("tspan", { fill: t.ink, "font-weight": "bold", dx: 8 });
      val.textContent = p.value;
      g.append(name, val);
      svg.appendChild(g);
    });

    const avg = state.pillars.reduce((s, p) => s + p.value, 0) / N;
    document.getElementById("avg").textContent = avg.toFixed(1);
  }

  // ---------- pillar list ----------
  function renderList() {
    const list = document.getElementById("pillar-list");
    list.textContent = "";
    state.pillars.forEach((p, i) => {
      const li = document.createElement("li");
      const isFixed = i < FIXED.length;

      let nameEl;
      if (isFixed) {
        nameEl = document.createElement("span");
        nameEl.className = "name";
        nameEl.textContent = p.name;
      } else {
        nameEl = document.createElement("input");
        nameEl.className = "name";
        nameEl.value = p.name;
        nameEl.maxLength = 24;
        nameEl.placeholder = "pillar name";
        nameEl.setAttribute("aria-label", "Pillar " + (i + 1) + " name");
        nameEl.addEventListener("input", () => {
          p.name = nameEl.value || "Pillar";
          renderChart(); persist();
        });
      }

      // star rating: click the nth star to set; click the current one to clear
      const stars = document.createElement("div");
      stars.className = "stars";
      stars.setAttribute("role", "radiogroup");
      stars.setAttribute("aria-label", p.name + " score");
      for (let n = 1; n <= MAX_VAL; n++) {
        const star = document.createElement("button");
        star.className = "star" + (n <= p.value ? " filled" : "");
        star.textContent = n <= p.value ? "★" : "☆";
        star.setAttribute("aria-label", p.name + ": " + n + " of " + MAX_VAL);
        star.setAttribute("role", "radio");
        star.setAttribute("aria-checked", String(n === p.value));
        star.addEventListener("click", () => {
          p.value = (p.value === n) ? 0 : n;
          renderList(); persist();
        });
        stars.appendChild(star);
      }

      li.append(nameEl, stars);
      if (isFixed) {
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        li.appendChild(spacer);
      } else {
        const rm = document.createElement("button");
        rm.className = "pcbtn rm";
        rm.textContent = "×";
        rm.setAttribute("aria-label", "Remove " + p.name);
        rm.addEventListener("click", () => {
          state.pillars.splice(i, 1);
          renderList(); persist();
        });
        li.appendChild(rm);
      }
      list.appendChild(li);
    });
    document.getElementById("add-pillar").disabled = state.pillars.length >= MAX_PILLARS;
    renderChart();
  }

  document.getElementById("add-pillar").addEventListener("click", () => {
    if (state.pillars.length >= MAX_PILLARS) return;
    state.pillars.push({ name: "Pillar", value: 3 });
    renderList(); persist();
    const inputs = document.querySelectorAll("#pillar-list input.name");
    const last = inputs[inputs.length - 1];
    last.focus(); last.select();
  });

  // ---------- title & color ----------
  const titleInput = document.getElementById("title-input");
  titleInput.value = state.title;
  titleInput.addEventListener("input", () => { state.title = titleInput.value; persist(); });

  const colorInput = document.getElementById("color-input");
  colorInput.value = state.color;
  colorInput.addEventListener("input", () => {
    state.color = colorInput.value;
    renderChart(); persist();
  });

  // ---------- actions ----------
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  document.getElementById("copy-link").addEventListener("click", async () => {
    persist();
    try {
      await navigator.clipboard.writeText(location.href);
      toast("link copied ♥");
    } catch (e) {
      prompt("Copy this link:", location.href);
    }
  });

  const shareBtn = document.getElementById("share");
  if (navigator.share) {
    shareBtn.hidden = false;
    shareBtn.addEventListener("click", () => {
      persist();
      navigator.share({ title: state.title || "my wellness wheel", url: location.href }).catch(() => {});
    });
  }

  document.getElementById("download").addEventListener("click", () => {
    const t = THEME;
    const SCALE = 2, W = 840, H = 640, HEAD = state.title ? 88 : 32;
    const clone = svg.cloneNode(true);
    clone.setAttribute("width", W); clone.setAttribute("height", H);
    clone.setAttribute("xmlns", NS);
    const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = W * SCALE;
      canvas.height = (H + HEAD) * SCALE;
      const ctx = canvas.getContext("2d");
      ctx.scale(SCALE, SCALE);
      ctx.fillStyle = t.surface;
      ctx.fillRect(0, 0, W, H + HEAD);
      if (state.title) {
        ctx.fillStyle = t.ink;
        ctx.font = "bold 26px 'Courier New', monospace";
        ctx.textAlign = "center";
        ctx.fillText(state.title, W / 2, 52);
      }
      ctx.drawImage(img, 0, HEAD, W, H);
      URL.revokeObjectURL(url);
      canvas.toBlob(png => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(png);
        a.download = (state.title || "wellness-wheel").toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".png";
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }, "image/png");
    };
    img.src = url;
  });

  document.getElementById("reset").addEventListener("click", () => {
    state = defaults();
    titleInput.value = "";
    colorInput.value = state.color;
    renderList(); persist();
    toast("reset ♥");
  });

  // ---------- go ----------
  renderList();
  persist();
})();
</script>
</body>
</html>
