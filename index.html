<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wellness</title>
<meta name="description" content="Map your wellness across life's pillars — score, color, and share your wheel.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='29' fill='%23f3c1cf' stroke='%2343301f' stroke-width='3'/%3E%3Ccircle cx='22' cy='28' r='3.5' fill='%2343301f'/%3E%3Ccircle cx='42' cy='28' r='3.5' fill='%2343301f'/%3E%3Ccircle cx='14.5' cy='36' r='3.5' fill='%23eda0b5'/%3E%3Ccircle cx='49.5' cy='36' r='3.5' fill='%23eda0b5'/%3E%3Cpath d='M22 38q10 9 20 0' fill='none' stroke='%2343301f' stroke-width='3.5' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light;
    /* retro vaporwave UI-kit palette */
    --brown: #43301f;      /* outlines & ink */
    --cream: #f6efdd;      /* window bodies */
    --cream-2: #fffbf0;    /* fields */
    --pink: #ef9aa9;       /* chart window title bar */
    --yellow: #f4c95d;     /* settings title bar */
    --star: #f2c14e;
    --heart: #d94f2b;
  }
  * { box-sizing: border-box; margin: 0; }

  body {
    /* the desktop: smooth lavender → pink, crisp elements on top */
    background: linear-gradient(115deg, #b7b0e8, #eeb4ce 60%, #f2bccb);
    background-attachment: fixed;
    color: var(--brown);
    font-family: "Courier New", Courier, monospace;
    font-size: 16px;
    min-height: 100vh;
    padding: 30px 18px 50px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  .layout { display: flex; flex-direction: column; gap: 26px; }
  /* both windows share the same width — the chart never scales wider than wellness.exe */
  .layout .window { width: 100%; max-width: 640px; margin: 0 auto; }

  /* window chrome: flat cream, brown outline, solid offset shadow */
  .window {
    background: var(--cream);
    border: 2px solid var(--brown);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 6px 7px 0 rgba(67, 48, 31, .3);
  }
  .titlebar {
    display: flex; align-items: center; gap: 8px;
    color: var(--brown); font-weight: bold; font-size: 18px;
    padding: 8px 13px;
    border-bottom: 2px solid var(--brown);
    user-select: none;
  }
  .titlebar.pink { background: var(--pink); }
  .titlebar.yellow { background: var(--yellow); }
  .t-btns { margin-left: auto; flex: none; letter-spacing: 10px; font-weight: bold; font-size: 20px; }
  .win-body { padding: 14px; }

  /* the diagram sits on white behind a brown outline */
  .canvas-panel {
    background: #fff;
    border: 2px solid var(--brown);
    border-radius: 5px;
    padding: 10px;
  }
  #chart { display: block; width: 100%; height: auto; touch-action: none; cursor: pointer; }

  /* editable title inside the chart window's title bar */
  #title-input {
    flex: 1; min-width: 0;
    font: bold 18px "Courier New", Courier, monospace;
    color: var(--brown); background: transparent;
    border: none; outline: none;
    padding: 0;
  }
  #title-input::placeholder { color: var(--brown); }

  .topline { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 14px; }
  .color-pick { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: bold; }
  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 24px; height: 24px; padding: 0; cursor: pointer;
    border: 2px solid var(--brown); border-radius: 5px;
  }
  .swatch.sel { outline: 2px solid var(--brown); outline-offset: 2px; }

  .pillars { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .pillars li { display: flex; align-items: center; gap: 7px; }
  .pillars .name { flex: 1; min-width: 0; }
  .pillars span.name { font-weight: bold; padding: 3px 0; }
  /* editable pillar names look exactly like the fixed ones */
  .pillars input.name {
    font: bold 16px "Courier New", Courier, monospace;
    color: var(--brown);
    background: transparent;
    border: none; border-bottom: 2px solid transparent;
    padding: 3px 0; outline: none;
  }
  .pillars input.name:hover, .pillars input.name:focus { border-bottom-color: var(--brown); }
  .pillars input.name::placeholder { color: rgba(67,48,31,.5); }

  /* heart ratings — one SVG shape for filled & empty, so hearts never change
     shape when clicked; click the nth heart, click it again to clear to 0 */
  .hearts { display: flex; flex: none; }
  .hrt {
    background: none; border: none; cursor: pointer;
    padding: 0 2px; line-height: 0;
  }
  .hrt svg { width: 25px; height: 25px; }

  /* raised cream buttons with solid offset shadow, pressed-in on click */
  .pcbtn {
    background: var(--cream-2); color: var(--brown);
    border: 2px solid var(--brown); border-radius: 5px;
    cursor: pointer;
    font: bold 14px "Courier New", Courier, monospace;
    box-shadow: 2px 3px 0 rgba(67, 48, 31, .55);
  }
  .pcbtn:active { transform: translate(2px, 3px); box-shadow: none; }
  .pcbtn:disabled { opacity: .45; cursor: default; box-shadow: none; }

  .rm { width: 24px; height: 24px; flex: none; font-size: 12px; line-height: 1; padding: 0; }
  .spacer { width: 24px; flex: none; }

  #add-pillar { margin-top: 14px; padding: 6px 12px; }

  /* copy + reset sit in a full-width row at the top of the chart window */
  .top-actions { display: flex; gap: 10px; margin-bottom: 14px; }
  .top-actions .pcbtn {
    flex: 1; height: 46px;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    font: bold 16px "Courier New", Courier, monospace;
  }
  .top-actions svg { width: 22px; height: 22px; flex: none; }

  .statusbar {
    margin-top: 16px;
    padding: 6px 11px;
    font-size: 15px; font-weight: bold;
    background: var(--cream-2);
    border: 2px solid var(--brown); border-radius: 5px;
  }
  .heart { color: var(--brown); } /* text hearts wear the ink color */
  .metrics { margin: 0 0 16px; } /* scores bar sits above the chart */
  /* short note cell — same look as the stamp bar, max 2 lines */
  textarea.note {
    display: block; width: 100%;
    font: bold 15px "Courier New", Courier, monospace;
    text-align: center; resize: none; overflow: hidden;
    color: var(--brown);
    outline: none;
  }
  textarea.note::placeholder { color: rgba(67,48,31,.5); }
  .fn { cursor: help; } /* metric lines carry explainer popups */
  /* little "hover me" badge after each metric line */
  .fn .qi {
    display: inline-block; width: 17px; height: 17px; line-height: 14px;
    margin-left: 5px; text-align: center; vertical-align: 1px;
    font-size: 11px; font-weight: bold;
    border: 2px solid var(--brown); border-radius: 50%;
    background: var(--cream);
  }
  .stamp { text-align: center; letter-spacing: 1px; }
  .loc {
    background: none; border: none; cursor: pointer;
    font: inherit; color: inherit; padding: 0 2px; line-height: 1;
  }
  .key { margin: 0 0 14px; text-align: center; }

  #toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
    background: var(--cream); color: var(--brown);
    font: bold 14px "Courier New", Courier, monospace;
    padding: 9px 15px;
    border: 2px solid var(--brown); border-radius: 5px;
    box-shadow: 3px 4px 0 rgba(67, 48, 31, .4);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; }

  /* cute explainer popup for "estimated functionality" */
  #tip {
    position: fixed; z-index: 30; max-width: 280px;
    background: var(--cream); color: var(--brown);
    font: bold 13px "Courier New", Courier, monospace;
    line-height: 1.45;
    padding: 10px 13px;
    border: 2px solid var(--brown); border-radius: 5px;
    box-shadow: 3px 4px 0 rgba(67, 48, 31, .4);
    white-space: pre-line; /* question and answer on their own lines */
    opacity: 0; transition: opacity .15s; pointer-events: none;
  }
  #tip.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="layout">

    <div class="window">
      <div class="titlebar pink">
        <span class="heart" aria-hidden="true">♥</span>
        <input id="title-input" placeholder="Wellness" aria-label="Chart title" maxlength="60">
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="top-actions">
          <button class="pcbtn" id="copy" title="Copy the wheel image to your clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            copy image
          </button>
          <button class="pcbtn" id="reset" title="Reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            reset
          </button>
        </div>
        <div class="statusbar stamp metrics" id="metrics"></div>
        <div class="canvas-panel">
          <svg id="chart" viewBox="0 0 840 640" role="img" aria-label="Wellness spider chart"></svg>
        </div>
        <textarea id="note" class="statusbar note" rows="2" maxlength="110" placeholder="note..." aria-label="Note"></textarea>
        <div class="statusbar stamp" id="stamp"></div>
      </div>
    </div>

    <div class="window">
      <div class="titlebar yellow">
        <span>wellness.exe</span>
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="topline">
          <div class="color-pick"><span>color</span>
            <div class="swatches" id="swatches" role="radiogroup" aria-label="Chart color"></div>
          </div>
        </div>
        <div class="statusbar key"><span class="heart">♥</span> 0 = struggling · 5 = thriving <span class="heart">♥</span></div>
        <ul class="pillars" id="pillar-list"></ul>
        <button class="pcbtn" id="add-pillar">+ add pillar</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<div id="tip" role="tooltip"></div>

<script>
(() => {
  "use strict";

  // ---------- theme: always light — explicit values so SVG serializes correctly for PNG export ----------
  const THEME = { surface:"#ffffff", ink:"#43301f", ink2:"#6b5138", muted:"#a8906e",
                  grid:"#e9dfc9", fillAlpha:0.18 };
  const FONT = "'Courier New', Courier, monospace";
  const rgba = (hex, a) => {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${n >> 16 & 255},${n >> 8 & 255},${n & 255},${a})`;
  };
  // pastel-wash a swatch (mix 45% toward white) — for the title bar
  const muted = hex => {
    const n = parseInt(hex.slice(1), 16);
    const mix = c => Math.round(c + (255 - c) * 0.45);
    return "#" + ((1 << 24) + (mix(n >> 16 & 255) << 16) + (mix(n >> 8 & 255) << 8) + mix(n & 255)).toString(16).slice(1);
  };

  // ---------- state ----------
  // bold colors only, sample-aesthetic adjacent, tuned a touch more vibrant
  const SWATCHES = ["#e03aa8", "#ea4b68", "#f28322", "#efae12", "#a8cc26", "#1fa982", "#17adc4", "#3178d6", "#8d55d6"];
  const DEFAULT_COLOR = SWATCHES[0];
  const FIXED = ["Mental", "Physical", "Productivity", "Sociability"];
  const MAX_PILLARS = 6, MAX_VAL = 5; // 4 fixed + 2 added — keeps areaBounds' brute force tiny

  function defaults() {
    return {
      title: "",
      note: "",
      color: SWATCHES[Math.floor(Math.random() * SWATCHES.length)], // every fresh wheel wears a random color
      pillars: FIXED.map(name => ({ name, value: 3 }))
    };
  }
  // The three fixed pillars always occupy slots 0-2 (matched by name if the
  // incoming data has them); everything else becomes an extra, capped at 7 total.
  function sanitize(s) {
    const color = SWATCHES.includes(String(s.color || "").toLowerCase()) ? s.color.toLowerCase() : DEFAULT_COLOR;
    const clampV = v => Math.round(Math.min(MAX_VAL, Math.max(0, Number(v) || 0)));
    const incoming = (Array.isArray(s.pillars) ? s.pillars : []).map(p => ({
      name: String(p.name || "Pillar").slice(0, 24),
      value: clampV(p.value)
    }));
    const pillars = FIXED.map(name => {
      // older saves/links used "Mental Health" / "Physical Health"
      const match = n => n === name.toLowerCase() || n === (name + " health").toLowerCase();
      const i = incoming.findIndex(p => match(p.name.toLowerCase()));
      return { name, value: i >= 0 ? incoming.splice(i, 1)[0].value : 3 };
    });
    return {
      title: String(s.title || "").slice(0, 60),
      note: String(s.note || "").split("\n").slice(0, 2).join("\n").slice(0, 110),
      color,
      pillars: pillars.concat(incoming.slice(0, MAX_PILLARS - FIXED.length))
    };
  }
  function load() {
    // a shared wheel in the URL hash loads; otherwise every visit starts fresh
    return decodeHash(location.hash) || defaults();
  }
  function encodeHash(s) {
    const json = JSON.stringify([s.title, s.color, s.pillars.map(p => [p.name, p.value]), s.note]);
    return "#" + btoa(String.fromCharCode(...new TextEncoder().encode(json)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function decodeHash(hash) {
    if (!hash || hash.length < 2) return null;
    try {
      const b64 = hash.slice(1).replace(/-/g, "+").replace(/_/g, "/");
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const parsed = JSON.parse(new TextDecoder().decode(bytes));
      // current format: [title, color, rows, note] — older links may lack note or color
      const [title, color, rows, note] = parsed.length >= 3 ? parsed : [parsed[0], DEFAULT_COLOR, parsed[1]];
      if (!Array.isArray(rows)) return null;
      return sanitize({ title, color, note, pillars: rows.map(([name, value]) => ({ name, value })) });
    } catch (e) { return null; }
  }
  function persist() {
    history.replaceState(null, "", encodeHash(state));
  }

  let state = load();

  // ---------- chart ----------
  const svg = document.getElementById("chart");
  const NS = "http://www.w3.org/2000/svg";
  const CX = 420, CY = 320, R = 200, LABEL_R = R + 40;

  const angle = i => -Math.PI / 2 + (i * 2 * Math.PI) / state.pillars.length;
  const pt = (i, v) => {
    const a = angle(i), r = (v / MAX_VAL) * R;
    return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
  };
  const el = (tag, attrs) => {
    const n = document.createElementNS(NS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  };

  function renderChart() {
    const t = THEME;
    const series = state.color;
    svg.textContent = "";
    const N = state.pillars.length;
    // chart order rule: Mental at the top (slot 0), Physical always LAST so
    // it sits immediately to the left of the top — extras land in between
    const ordered = state.pillars.slice();
    const ph = ordered.findIndex(q => q.name === "Physical");
    if (ph >= 0) ordered.push(ordered.splice(ph, 1)[0]);
    viewOrder = ordered;

    // grid rings (spider polygons) at 1..5 + spokes — recessive hairlines
    for (let v = 1; v <= MAX_VAL; v++) {
      const pts = ordered.map((_, i) => pt(i, v).join(",")).join(" ");
      svg.appendChild(el("polygon", { points: pts, fill: "none", stroke: t.grid, "stroke-width": 1.2 }));
    }
    for (let i = 0; i < N; i++) {
      const [x, y] = pt(i, MAX_VAL);
      svg.appendChild(el("line", { x1: CX, y1: CY, x2: x, y2: y, stroke: t.grid, "stroke-width": 1.2 }));
    }
    // data polygon
    const poly = ordered.map((p, i) => pt(i, p.value).join(",")).join(" ");
    svg.appendChild(el("polygon", { points: poly, fill: rgba(series, t.fillAlpha), stroke: series,
      "stroke-width": 3, "stroke-linejoin": "round" }));

    // vertices + score number just outside each point
    ordered.forEach((p, i) => {
      const a = angle(i);
      const [x, y] = pt(i, p.value);
      svg.appendChild(el("circle", { cx: x, cy: y, r: 6.5, fill: t.surface,
        stroke: series, "stroke-width": 3 }));
      const lx = x + 24 * Math.cos(a), ly = y + 24 * Math.sin(a);
      const num = el("text", { x: lx, y: ly + 7, "text-anchor": "middle",
        fill: t.ink, "font-size": 21, "font-weight": "bold", "font-family": FONT,
        stroke: "#ffffff", "stroke-width": 5, "paint-order": "stroke" });
      num.textContent = p.value;
      svg.appendChild(num);
    });

    // pillar labels (name wrapped onto lines + bold value) — ink tokens, never series color
    const wrapName = (str, max = 11) => {
      const lines = [];
      let cur = "";
      for (const w of str.split(/\s+/)) {
        if (cur && (cur + " " + w).length > max) { lines.push(cur); cur = w; }
        else cur = cur ? cur + " " + w : w;
      }
      if (cur) lines.push(cur);
      return lines;
    };
    const LH = 27; // line height for the 22px label font
    ordered.forEach((p, i) => {
      const a = angle(i);
      const x = CX + LABEL_R * Math.cos(a), y = CY + LABEL_R * Math.sin(a);
      const cos = Math.cos(a), sin = Math.sin(a);
      const anchor = Math.abs(cos) < 0.3 ? "middle" : cos > 0 ? "start" : "end";
      const lines = wrapName(p.name);
      // anchor the block so it grows away from the chart: down when below,
      // up when above, vertically centered at the sides
      let startDy;
      if (sin > 0.85) startDy = 22;
      else if (sin < -0.85) startDy = -12 - (lines.length - 1) * LH;
      else startDy = 7 - ((lines.length - 1) * LH) / 2;
      const g = el("text", { x, y: y + startDy, "text-anchor": anchor, fill: t.ink,
        "font-size": 22, "font-weight": "bold", "font-family": FONT });
      lines.forEach((ln, li) => {
        const ts = el("tspan", { x, dy: li === 0 ? 0 : LH });
        ts.textContent = ln;
        g.appendChild(ts);
      });
      svg.appendChild(g);
    });

    // scores live in the cream bar above the chart (see #metrics);
    // each line wears its own explainer popup on hover
    const [m1, m2] = metricsLines();
    const mBar = document.getElementById("metrics");
    const badge = ' <span class="qi" aria-hidden="true">?</span>';
    mBar.innerHTML = '<span class="fn">' + m1 + badge + "</span><br>" +
      '<span class="fn">' + m2 + badge + "</span>";
    [TIP_MEAN, TIP_FN].forEach((txt, i) => {
      const span = mBar.querySelectorAll(".fn")[i];
      span.addEventListener("pointerenter", e => showTip(e, txt));
      span.addEventListener("pointermove", moveTip);
      span.addEventListener("pointerleave", hideTip);
    });
  }

  // mean score + estimated functionality: the min-max shaded area these
  // values could produce across axis orderings, as a share of the full
  // all-5s polygon
  function metricsLines() {
    const avg = state.pillars.reduce((s, p) => s + p.value, 0) / state.pillars.length;
    const [aMin, aMax] = areaBounds(state.pillars.map(p => p.value));
    const pct = x => Math.round(x * 100) + "%";
    const range = pct(aMin) === pct(aMax) ? pct(aMax) : pct(aMin) + "-" + pct(aMax);
    return ["average wellness: " + avg.toFixed(1),
            "estimated functionality: " + range];
  }

  // ---------- metric explainer popups ----------
  const tipEl = document.getElementById("tip");
  const TIP_MEAN = "♥ what is average wellness? ♥\n" +
    "the simple arithmetic mean of your pillars: add up the heart scores, " +
    "divide by the number of pillars. every pillar counts equally — nothing " +
    "compounds here.";
  const TIP_FN = "♥ what is estimated functionality? ♥\n" +
    "the mean is purely additive — but shaded area " +
    "compounds: it sums each pillar × its neighbor, so it never scales neatly " +
    "with the mean. we lean into that as a metaphor: life's pillars compound " +
    "on one another, each one scaling the next. the same scores can shade more " +
    "or less of the full wheel depending on how they sit — this range runs from " +
    "their worst arrangement to their best.";
  function moveTip(e) {
    const pad = 14, w = tipEl.offsetWidth, h = tipEl.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + w > innerWidth - 8) x = e.clientX - w - pad;
    if (y + h > innerHeight - 8) y = e.clientY - h - pad;
    tipEl.style.left = x + "px"; tipEl.style.top = y + "px";
  }
  function showTip(e, txt) { tipEl.textContent = txt; tipEl.classList.add("show"); moveTip(e); }
  function hideTip() { tipEl.classList.remove("show"); }

  // min & max polygon area over all axis orderings, as a fraction of the
  // full (all-5s) polygon. Area ∝ Σ adjacent-value products — the ½sin(2π/N)
  // factor cancels in the ratio — so brute-force the cyclic orderings with
  // the first value pinned (rotations don't change the sum; ≤5! = 120 perms)
  function areaBounds(vals) {
    let min = Infinity, max = -Infinity;
    const perm = (rest, ring) => {
      if (!rest.length) {
        let s = 0;
        for (let i = 0; i < ring.length; i++) s += ring[i] * ring[(i + 1) % ring.length];
        min = Math.min(min, s); max = Math.max(max, s);
        return;
      }
      for (let i = 0; i < rest.length; i++)
        perm(rest.slice(0, i).concat(rest.slice(i + 1)), ring.concat(rest[i]));
    };
    perm(vals.slice(1), [vals[0]]);
    return [min, max].map(s => s / (MAX_VAL * MAX_VAL * vals.length));
  }

  // ---------- pillar list ----------
  function renderList() {
    const list = document.getElementById("pillar-list");
    list.textContent = "";
    state.pillars.forEach((p, i) => {
      const li = document.createElement("li");
      const isFixed = i < FIXED.length;

      let nameEl;
      if (isFixed) {
        nameEl = document.createElement("span");
        nameEl.className = "name";
        nameEl.textContent = p.name;
      } else {
        nameEl = document.createElement("input");
        nameEl.className = "name";
        nameEl.value = p.name;
        nameEl.maxLength = 24;
        nameEl.placeholder = "pillar name";
        nameEl.setAttribute("aria-label", "Pillar " + (i + 1) + " name");
        nameEl.addEventListener("input", () => {
          p.name = nameEl.value || "Pillar";
          renderChart(); persist();
        });
      }

      // heart rating: click the nth heart to set; click the current one to clear
      const hearts = document.createElement("div");
      hearts.className = "hearts";
      hearts.setAttribute("role", "radiogroup");
      hearts.setAttribute("aria-label", p.name + " score");
      const HEART_PATH = "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z";
      for (let n = 1; n <= MAX_VAL; n++) {
        const hrt = document.createElement("button");
        hrt.className = "hrt";
        hrt.innerHTML = '<svg viewBox="0 0 24 24" fill="' + (n <= p.value ? state.color : "none") +
          '" stroke="#43301f" stroke-width="2" stroke-linejoin="round"><path d="' + HEART_PATH + '"/></svg>';
        hrt.setAttribute("aria-label", p.name + ": " + n + " of " + MAX_VAL);
        hrt.setAttribute("role", "radio");
        hrt.setAttribute("aria-checked", String(n === p.value));
        hrt.addEventListener("click", () => {
          p.value = (p.value === n) ? 0 : n;
          renderList(); persist();
        });
        hearts.appendChild(hrt);
      }

      li.append(nameEl, hearts);
      if (isFixed) {
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        li.appendChild(spacer);
      } else {
        const rm = document.createElement("button");
        rm.className = "pcbtn rm";
        rm.textContent = "×";
        rm.setAttribute("aria-label", "Remove " + p.name);
        rm.addEventListener("click", () => {
          state.pillars.splice(i, 1);
          renderList(); persist();
        });
        li.appendChild(rm);
      }
      list.appendChild(li);
    });
    document.getElementById("add-pillar").disabled = state.pillars.length >= MAX_PILLARS;
    renderChart();
  }

  // ---------- drag the wheel — snaps to whole hearts ----------
  let dragging = -1;
  let viewOrder = []; // chart-order pillar refs, set by renderChart
  function svgPoint(evt) {
    const p = new DOMPoint(evt.clientX, evt.clientY);
    return p.matrixTransform(svg.getScreenCTM().inverse());
  }
  function nearestSpoke(evt) {
    const q = svgPoint(evt);
    const a = Math.atan2(q.y - CY, q.x - CX);
    let best = 0, bd = Infinity;
    for (let i = 0; i < state.pillars.length; i++) {
      let d = Math.abs(a - angle(i));
      d = Math.min(d, 2 * Math.PI - d);
      if (d < bd) { bd = d; best = i; }
    }
    return best;
  }
  function dragValue(evt) {
    const q = svgPoint(evt), a = angle(dragging);
    const v = ((q.x - CX) * Math.cos(a) + (q.y - CY) * Math.sin(a)) / R * MAX_VAL;
    const snapped = Math.round(Math.min(MAX_VAL, Math.max(0, v)));
    if (viewOrder[dragging].value !== snapped) {
      viewOrder[dragging].value = snapped;
      renderList(); // hearts follow the drag
    }
  }
  // a drag may start anywhere on the 0–5 grid: inside the outer ring, or
  // near a data vertex (which can sit right on the edge) — clicks beyond
  // the grid change nothing
  function onGrid(q) {
    const n = viewOrder.length;
    for (let i = 0; i < n; i++) {
      const [vx, vy] = pt(i, viewOrder[i].value);
      if (Math.hypot(q.x - vx, q.y - vy) < 22) return true; // grab a vertex
    }
    let inside = false; // ray-cast against the outer (value 5) grid polygon
    for (let i = 0, j = n - 1; i < n; j = i++) {
      const [xi, yi] = pt(i, MAX_VAL);
      const [xj, yj] = pt(j, MAX_VAL);
      if ((yi > q.y) !== (yj > q.y) && q.x < (xj - xi) * (q.y - yi) / (yj - yi) + xi) inside = !inside;
    }
    return inside;
  }
  svg.addEventListener("pointerdown", evt => {
    const q = svgPoint(evt);
    if (!onGrid(q)) return;
    dragging = nearestSpoke(evt);
    svg.setPointerCapture(evt.pointerId);
    dragValue(evt);
    evt.preventDefault();
  });
  svg.addEventListener("pointermove", evt => { if (dragging >= 0) dragValue(evt); });
  const endDrag = () => { if (dragging >= 0) { dragging = -1; persist(); } };
  svg.addEventListener("pointerup", endDrag);
  svg.addEventListener("pointercancel", endDrag);

  document.getElementById("add-pillar").addEventListener("click", () => {
    if (state.pillars.length >= MAX_PILLARS) return;
    state.pillars.push({ name: "Pillar", value: 3 });
    renderList(); persist();
    const inputs = document.querySelectorAll("#pillar-list input.name");
    const last = inputs[inputs.length - 1];
    last.focus(); last.select();
  });

  // ---------- retro datetime + location stamp ----------
  // default "location" is the official time-zone name (e.g. "Eastern Daylight
  // Time") — a real city only ever appears via the opt-in 📍 link
  let city = "";
  try {
    city = new Intl.DateTimeFormat("en", { timeZoneName: "long" })
      .formatToParts(new Date()).find(p => p.type === "timeZoneName").value;
  } catch (e) {
    city = (Intl.DateTimeFormat().resolvedOptions().timeZone || "");
  }

  // "UTC-4", "UTC+5:30" — appended to whatever location the stamp shows
  const utcLabel = (() => {
    const m = -new Date().getTimezoneOffset();
    const h = Math.trunc(Math.abs(m) / 60), mm = Math.abs(m) % 60;
    return "UTC" + (m < 0 ? "-" : "+") + h + (mm ? ":" + String(mm).padStart(2, "0") : "");
  })();

  function dateTimePart() {
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    let h = now.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return pad(now.getMonth() + 1) + "/" + pad(now.getDate()) + "/" + now.getFullYear() +
      " " + pad(h) + ":" + pad(now.getMinutes()) + " " + ampm;
  }
  // stamp always renders as two lines: datetime on top, location below
  const stampLines = () => ["🕒 " + dateTimePart(),
    city ? "📍 " + city + " (" + utcLabel + ")" : ""];
  // precise location is strictly OPT-IN: nothing is requested until the 📍
  // location is clicked (the coordinates go to BigDataCloud once, to be turned
  // into a city name; only the name is kept, in this browser)
  let preciseCity = null;
  try { preciseCity = localStorage.getItem("ww-city"); } catch (e) {}
  if (preciseCity) city = preciseCity;

  const stampEl = document.getElementById("stamp");
  const renderStamp = () => {
    stampEl.innerHTML = "🕒 " + dateTimePart() + "<br>" +
      '<button class="loc" id="loc-btn" title="' +
      (preciseCity ? "Location you shared" : "Use my precise location (asks permission, sent once to a geocoding service)") +
      '">📍 ' + city + " (" + utcLabel + ")</button>";
  };
  renderStamp();
  setInterval(renderStamp, 30000);

  stampEl.addEventListener("click", e => {
    if (!e.target.closest || !e.target.closest("#loc-btn")) return;
    if (!navigator.geolocation) return toast("location not available here");
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const r = await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" +
          pos.coords.latitude + "&longitude=" + pos.coords.longitude + "&localityLanguage=en");
        const j = await r.json();
        // prefer locality (borough/neighborhood, e.g. "Brooklyn") over the
        // broader city ("New York")
        const c = j.locality || j.city || j.principalSubdivision;
        if (c) {
          preciseCity = c;
          city = c;
          try { localStorage.setItem("ww-city", c); } catch (e2) {}
          renderStamp();
          toast("location added ♥");
        } else toast("couldn't find your city");
      } catch (e2) { toast("couldn't find your city"); }
    }, () => toast("location not shared — keeping " + city),
      { timeout: 8000, maximumAge: 3600000 });
  });

  // ---------- title, note & color ----------
  const titleInput = document.getElementById("title-input");
  titleInput.value = state.title;
  titleInput.addEventListener("input", () => { state.title = titleInput.value; persist(); });

  const noteEl = document.getElementById("note");
  noteEl.value = state.note;
  noteEl.addEventListener("input", () => {
    const lines = noteEl.value.split("\n");
    if (lines.length > 2) noteEl.value = lines.slice(0, 2).join("\n"); // max 2 lines
    state.note = noteEl.value;
    persist();
  });

  // the note as up to 2 export lines: manual break respected, else word-wrapped
  function noteLines() {
    const note = state.note.trim();
    if (!note) return [];
    const wrap = (str, max) => {
      const out = [];
      let cur = "";
      for (const w of str.split(/\s+/)) {
        if (cur && (cur + " " + w).length > max) { out.push(cur); cur = w; }
        else cur = cur ? cur + " " + w : w;
      }
      if (cur) out.push(cur);
      return out;
    };
    return note.split("\n").flatMap(seg => wrap(seg, 56)).slice(0, 2);
  }

  function renderSwatches() {
    const box = document.getElementById("swatches");
    box.textContent = "";
    for (const c of SWATCHES) {
      const b = document.createElement("button");
      b.className = "swatch" + (state.color === c ? " sel" : "");
      b.style.background = c;
      b.setAttribute("role", "radio");
      b.setAttribute("aria-checked", String(state.color === c));
      b.setAttribute("aria-label", "Chart color " + c);
      b.addEventListener("click", () => {
        state.color = c;
        renderSwatches(); renderList(); persist(); // list too — hearts wear the chart color
      });
      box.appendChild(b);
    }
    // both title bars wear a muted wash of the selected color
    document.querySelectorAll(".titlebar").forEach(tb => { tb.style.background = muted(state.color); });
  }

  // ---------- actions ----------
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  // PNG screenshot: the chart window on the gradient desktop — opens in a new tab
  function downloadBlob(blob, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }
  const slug = () => (state.title || "wellness").toLowerCase().replace(/[^a-z0-9]+/g, "-");

  function windowPNG(lines, done) {
    const SCALE = 2, SVG_W = 840, SVG_H = 640; // 2× for retina-crisp text (~1500px wide)
    // the chart draws at its full 840 internal width here — on screen it is
    // scaled down to ~62% — so all chrome (bars, fonts, radii) is ×1.6 its
    // on-screen CSS size to keep the same text-size ratios as the live page
    const TB = 64, PAD = 23, PNL = 16, BARH = 84, GAP = 26;
    const panelW = SVG_W + PNL * 2, panelH = SVG_H + PNL * 2;
    const W = SVG_W + (PAD + PNL) * 2;
    const noteRows = noteLines();
    const mbY = TB + PAD;                                  // metrics bar
    const panelY = mbY + BARH + GAP;                       // chart panel
    const nbY = panelY + panelH + GAP;                     // note bar (only if written)
    const sbY = noteRows.length ? nbY + BARH + GAP : nbY;  // stamp bar
    const H = sbY + BARH + PAD;
    const BROWN = "#43301f", CREAM = "#f6efdd", CREAM2 = "#fffbf0";

    const clone = svg.cloneNode(true);
    clone.setAttribute("width", SVG_W); clone.setAttribute("height", SVG_H);
    clone.setAttribute("xmlns", NS);
    const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const M = 56;            // desktop background margin around the window
      const WS = 640 / W;      // render the window small — its real on-screen width
      const outW = W * WS + M * 2, outH = H * WS + M * 2;
      const canvas = document.createElement("canvas");
      canvas.width = outW * SCALE;
      canvas.height = outH * SCALE;
      const ctx = canvas.getContext("2d");
      ctx.scale(SCALE, SCALE);

      // the lavender→pink desktop behind the window
      const grad = ctx.createLinearGradient(0, 0, outW, outH * 0.9);
      grad.addColorStop(0, "#b7b0e8");
      grad.addColorStop(0.6, "#eeb4ce");
      grad.addColorStop(1, "#f2bccb");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, outW, outH);

      // the window's solid offset shadow, then the window itself
      ctx.translate(M, M);
      ctx.scale(WS, WS);
      ctx.fillStyle = "rgba(67, 48, 31, .3)";
      ctx.beginPath(); ctx.roundRect(10, 11, W - 3, H - 3, 13); ctx.fill();

      // window body + clipped title bar
      ctx.beginPath(); ctx.roundRect(1.5, 1.5, W - 3, H - 3, 13);
      ctx.fillStyle = CREAM; ctx.fill();
      ctx.save(); ctx.clip();
      ctx.fillStyle = muted(state.color); ctx.fillRect(0, 0, W, TB);
      ctx.fillStyle = BROWN; ctx.fillRect(0, TB - 3, W, 3);
      ctx.restore();
      ctx.lineWidth = 3; ctx.strokeStyle = BROWN;
      ctx.beginPath(); ctx.roundRect(1.5, 1.5, W - 3, H - 3, 13); ctx.stroke();

      // title bar text
      ctx.textBaseline = "middle";
      ctx.font = "bold 29px 'Courier New', monospace";
      ctx.textAlign = "left";
      ctx.fillStyle = BROWN; ctx.fillText("♥", PAD, TB / 2 + 2);
      ctx.fillText(state.title || "Wellness", PAD + 42, TB / 2 + 2);
      ctx.textAlign = "right"; ctx.fillText("–  □  ×", W - PAD, TB / 2 + 2);

      // cream text bars: metrics above the chart, note + stamp below
      const drawBar = (y, rows) => {
        ctx.beginPath(); ctx.roundRect(PAD + 1.5, y, panelW - 3, BARH, 8);
        ctx.fillStyle = CREAM2; ctx.fill(); ctx.stroke();
        ctx.font = "bold 24px 'Courier New', monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = BROWN;
        rows.forEach((ln, i) => {
          ctx.fillText(ln, W / 2, y + BARH / 2 + 2 + (i - (rows.length - 1) / 2) * 34);
        });
      };
      drawBar(mbY, metricsLines());

      // white canvas panel + chart
      ctx.beginPath(); ctx.roundRect(PAD + 1.5, panelY + 1.5, panelW - 3, panelH - 3, 8);
      ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.stroke();
      ctx.drawImage(img, PAD + PNL, panelY + PNL, SVG_W, SVG_H);

      if (noteRows.length) drawBar(nbY, noteRows);
      drawBar(sbY, lines.filter(Boolean));

      URL.revokeObjectURL(url);
      canvas.toBlob(done, "image/png");
    };
    img.src = url;
  }

  document.getElementById("copy").addEventListener("click", () => {
    // the PNG goes straight to the clipboard; the stamp is the moment of
    // the click. ClipboardItem takes the promise so the write stays inside
    // the user gesture (Safari requires this). No clipboard → download.
    if (navigator.clipboard && window.ClipboardItem) {
      const png = new Promise(res => windowPNG(stampLines(), res));
      navigator.clipboard.write([new ClipboardItem({ "image/png": png })]).then(
        () => toast("copied to clipboard ♥"),
        () => windowPNG(stampLines(), b => { downloadBlob(b, slug() + ".png"); toast("couldn't copy — downloaded instead"); })
      );
    } else {
      windowPNG(stampLines(), b => { downloadBlob(b, slug() + ".png"); toast("no clipboard here — downloaded instead"); });
    }
  });
  document.getElementById("reset").addEventListener("click", () => {
    state = defaults();
    titleInput.value = "";
    noteEl.value = "";
    renderSwatches(); renderList(); persist();
    toast("reset ♥");
  });

  // ---------- go ----------
  renderSwatches();
  renderList();
  persist();
})();
</script>
</body>
</html>
