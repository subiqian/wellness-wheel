<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wellness</title>
<meta name="description" content="Map your wellness across life's pillars — score, color, and share your wheel.">
<style>
  :root {
    color-scheme: light;
    /* retro vaporwave UI-kit palette */
    --brown: #43301f;      /* outlines & ink */
    --cream: #f6efdd;      /* window bodies */
    --cream-2: #fffbf0;    /* fields */
    --pink: #ef9aa9;       /* chart window title bar */
    --yellow: #f4c95d;     /* settings title bar */
    --star: #f2c14e;
    --heart: #d94f2b;
  }
  * { box-sizing: border-box; margin: 0; }

  body {
    /* the desktop: smooth lavender → pink, crisp elements on top */
    background: linear-gradient(115deg, #b7b0e8, #eeb4ce 60%, #f2bccb);
    background-attachment: fixed;
    color: var(--brown);
    font-family: "Courier New", Courier, monospace;
    font-size: 16px;
    min-height: 100vh;
    padding: 30px 18px 50px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  .layout { display: flex; flex-direction: column; gap: 26px; }
  /* both windows share the same width — the chart never scales wider than wellness.exe */
  .layout .window { width: 100%; max-width: 640px; margin: 0 auto; }

  /* window chrome: flat cream, brown outline, solid offset shadow */
  .window {
    background: var(--cream);
    border: 2px solid var(--brown);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 6px 7px 0 rgba(67, 48, 31, .3);
  }
  .titlebar {
    display: flex; align-items: center; gap: 8px;
    color: var(--brown); font-weight: bold; font-size: 18px;
    padding: 8px 13px;
    border-bottom: 2px solid var(--brown);
    user-select: none;
  }
  .titlebar.pink { background: var(--pink); }
  .titlebar.yellow { background: var(--yellow); }
  .t-btns { margin-left: auto; flex: none; letter-spacing: 10px; font-weight: bold; font-size: 20px; }
  .win-body { padding: 14px; }

  /* the diagram sits on white behind a brown outline */
  .canvas-panel {
    background: #fff;
    border: 2px solid var(--brown);
    border-radius: 5px;
    padding: 10px;
  }
  #chart { display: block; width: 100%; height: auto; touch-action: none; cursor: pointer; }

  /* editable title inside the chart window's title bar */
  #title-input {
    flex: 1; min-width: 0;
    font: bold 18px "Courier New", Courier, monospace;
    color: var(--brown); background: transparent;
    border: none; outline: none;
    padding: 0;
  }
  #title-input::placeholder { color: var(--brown); }

  .topline { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .stat { display: flex; align-items: baseline; gap: 7px; }
  .stat .value { font-size: 30px; font-weight: bold; }
  .stat .label { font-size: 15px; font-weight: bold; }
  .color-pick { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: bold; }
  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 24px; height: 24px; padding: 0; cursor: pointer;
    border: 2px solid var(--brown); border-radius: 5px;
  }
  .swatch.sel { outline: 2px solid var(--brown); outline-offset: 2px; }

  .pillars { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .pillars li { display: flex; align-items: center; gap: 7px; }
  .pillars .name { flex: 1; min-width: 0; }
  .pillars span.name { font-weight: bold; padding: 3px 0; }
  /* editable pillar names look exactly like the fixed ones */
  .pillars input.name {
    font: bold 16px "Courier New", Courier, monospace;
    color: var(--brown);
    background: transparent;
    border: none; border-bottom: 2px solid transparent;
    padding: 3px 0; outline: none;
  }
  .pillars input.name:hover, .pillars input.name:focus { border-bottom-color: var(--brown); }
  .pillars input.name::placeholder { color: rgba(67,48,31,.5); }

  /* heart ratings — one SVG shape for filled & empty, so hearts never change
     shape when clicked; click the nth heart, click it again to clear to 0 */
  .hearts { display: flex; flex: none; }
  .hrt {
    background: none; border: none; cursor: pointer;
    padding: 0 2px; line-height: 0;
  }
  .hrt svg { width: 25px; height: 25px; }

  /* raised cream buttons with solid offset shadow, pressed-in on click */
  .pcbtn {
    background: var(--cream-2); color: var(--brown);
    border: 2px solid var(--brown); border-radius: 5px;
    cursor: pointer;
    font: bold 14px "Courier New", Courier, monospace;
    box-shadow: 2px 3px 0 rgba(67, 48, 31, .55);
  }
  .pcbtn:active { transform: translate(2px, 3px); box-shadow: none; }
  .pcbtn:disabled { opacity: .45; cursor: default; box-shadow: none; }

  .rm { width: 24px; height: 24px; flex: none; font-size: 12px; line-height: 1; padding: 0; }
  .spacer { width: 24px; flex: none; }

  #add-pillar { margin-top: 14px; padding: 6px 12px; }

  .actions { display: flex; gap: 9px; margin-top: 16px; align-items: center; }
  .actions .pcbtn {
    width: 42px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .actions svg { width: 17px; height: 17px; display: block; }
  /* the save button: big, colorful, bottom right */
  #save { margin-left: auto; width: 62px; height: 48px; color: #fff; box-shadow: 3px 4px 0 rgba(67, 48, 31, .55); }
  #save svg { width: 24px; height: 24px; }

  .statusbar {
    margin-top: 16px;
    padding: 6px 11px;
    font-size: 15px; font-weight: bold;
    background: var(--cream-2);
    border: 2px solid var(--brown); border-radius: 5px;
  }
  .statusbar .heart { color: var(--heart); }
  .stamp { text-align: center; letter-spacing: 1px; }
  .key { margin: 0 0 14px; text-align: center; }

  #toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
    background: var(--cream); color: var(--brown);
    font: bold 14px "Courier New", Courier, monospace;
    padding: 9px 15px;
    border: 2px solid var(--brown); border-radius: 5px;
    box-shadow: 3px 4px 0 rgba(67, 48, 31, .4);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="layout">

    <div class="window">
      <div class="titlebar pink">
        <span class="heart" style="color:#d94f2b" aria-hidden="true">♥</span>
        <input id="title-input" placeholder="Wellness" aria-label="Chart title" maxlength="60">
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="canvas-panel">
          <svg id="chart" viewBox="0 0 840 640" role="img" aria-label="Wellness spider chart"></svg>
        </div>
        <div class="statusbar stamp" id="stamp"></div>
      </div>
    </div>

    <div class="window">
      <div class="titlebar yellow">
        <span>wellness.exe</span>
        <span class="t-btns" aria-hidden="true">– □ ×</span>
      </div>
      <div class="win-body">
        <div class="topline">
          <div class="stat">
            <span class="label">overall</span>
            <span class="value" id="avg">–</span>
          </div>
          <div class="color-pick"><span>color</span>
            <div class="swatches" id="swatches" role="radiogroup" aria-label="Chart color"></div>
          </div>
        </div>
        <div class="statusbar key"><span class="heart">♥</span> 0 = struggling · 5 = thriving <span class="heart">♥</span></div>
        <ul class="pillars" id="pillar-list"></ul>
        <button class="pcbtn" id="add-pillar">+ add pillar</button>
        <div class="actions">
          <button class="pcbtn" id="share" hidden title="Share" aria-label="Share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
          <button class="pcbtn" id="download" title="Download PNG" aria-label="Download PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="pcbtn" id="reset" title="Reset" aria-label="Reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button class="pcbtn" id="save" title="Save — screenshot + CSV record" aria-label="Save screenshot and CSV record">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
(() => {
  "use strict";

  // ---------- theme: always light — explicit values so SVG serializes correctly for PNG export ----------
  const THEME = { surface:"#ffffff", ink:"#43301f", ink2:"#6b5138", muted:"#a8906e",
                  grid:"#e9dfc9", fillAlpha:0.18 };
  const FONT = "'Courier New', Courier, monospace";
  const rgba = (hex, a) => {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${n >> 16 & 255},${n >> 8 & 255},${n & 255},${a})`;
  };

  // ---------- state ----------
  // bold colors only, sample-aesthetic adjacent, tuned a touch more vibrant
  const SWATCHES = ["#e03aa8", "#ea4b68", "#f28322", "#efae12", "#a8cc26", "#1fa982", "#17adc4", "#3178d6", "#8d55d6"];
  const DEFAULT_COLOR = SWATCHES[0];
  const STORE_KEY = "wellness-wheel-v2";
  const FIXED = ["Mental Health", "Productivity", "Sociability", "Physical Health"];
  const MAX_PILLARS = 7, MAX_VAL = 5;

  function defaults() {
    return {
      title: "",
      color: DEFAULT_COLOR,
      pillars: FIXED.map(name => ({ name, value: 3 }))
    };
  }
  // The three fixed pillars always occupy slots 0-2 (matched by name if the
  // incoming data has them); everything else becomes an extra, capped at 7 total.
  function sanitize(s) {
    const color = SWATCHES.includes(String(s.color || "").toLowerCase()) ? s.color.toLowerCase() : DEFAULT_COLOR;
    const clampV = v => Math.round(Math.min(MAX_VAL, Math.max(0, Number(v) || 0)));
    const incoming = (Array.isArray(s.pillars) ? s.pillars : []).map(p => ({
      name: String(p.name || "Pillar").slice(0, 24),
      value: clampV(p.value)
    }));
    const pillars = FIXED.map(name => {
      const i = incoming.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
      return { name, value: i >= 0 ? incoming.splice(i, 1)[0].value : 3 };
    });
    return {
      title: String(s.title || "").slice(0, 60),
      color,
      pillars: pillars.concat(incoming.slice(0, MAX_PILLARS - FIXED.length))
    };
  }
  function load() {
    // URL hash wins (a shared wheel), then this browser's saved wheel, then defaults.
    const fromHash = decodeHash(location.hash);
    if (fromHash) return fromHash;
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return sanitize(JSON.parse(raw));
    } catch (e) { /* corrupted storage — fall through */ }
    return defaults();
  }
  function encodeHash(s) {
    const json = JSON.stringify([s.title, s.color, s.pillars.map(p => [p.name, p.value])]);
    return "#" + btoa(String.fromCharCode(...new TextEncoder().encode(json)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function decodeHash(hash) {
    if (!hash || hash.length < 2) return null;
    try {
      const b64 = hash.slice(1).replace(/-/g, "+").replace(/_/g, "/");
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const parsed = JSON.parse(new TextDecoder().decode(bytes));
      // current format: [title, color, rows] — older links: [title, rows]; extra row fields ignored
      const [title, color, rows] = parsed.length === 3 ? parsed : [parsed[0], DEFAULT_COLOR, parsed[1]];
      if (!Array.isArray(rows)) return null;
      return sanitize({ title, color, pillars: rows.map(([name, value]) => ({ name, value })) });
    } catch (e) { return null; }
  }
  function persist() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
    history.replaceState(null, "", encodeHash(state));
  }

  let state = load();

  // ---------- chart ----------
  const svg = document.getElementById("chart");
  const NS = "http://www.w3.org/2000/svg";
  const CX = 420, CY = 320, R = 200, LABEL_R = R + 40;

  const angle = i => -Math.PI / 2 + (i * 2 * Math.PI) / state.pillars.length;
  const pt = (i, v) => {
    const a = angle(i), r = (v / MAX_VAL) * R;
    return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
  };
  const el = (tag, attrs) => {
    const n = document.createElementNS(NS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  };

  function renderChart() {
    const t = THEME;
    const series = state.color;
    svg.textContent = "";
    const N = state.pillars.length;
    // chart order rule: Mental Health at the top (slot 0), Physical Health
    // always LAST so it sits immediately to the left of the top — extras land in between
    const ordered = state.pillars.slice();
    const ph = ordered.findIndex(q => q.name === "Physical Health");
    if (ph >= 0) ordered.push(ordered.splice(ph, 1)[0]);
    viewOrder = ordered;

    // grid rings (spider polygons) at 1..5 + spokes — recessive hairlines
    for (let v = 1; v <= MAX_VAL; v++) {
      const pts = ordered.map((_, i) => pt(i, v).join(",")).join(" ");
      svg.appendChild(el("polygon", { points: pts, fill: "none", stroke: t.grid, "stroke-width": 1.2 }));
    }
    for (let i = 0; i < N; i++) {
      const [x, y] = pt(i, MAX_VAL);
      svg.appendChild(el("line", { x1: CX, y1: CY, x2: x, y2: y, stroke: t.grid, "stroke-width": 1.2 }));
    }
    // ring value labels along the top spoke
    for (let v = 1; v <= MAX_VAL; v++) {
      const lbl = el("text", { x: CX + 9, y: CY - (v / MAX_VAL) * R + 4, fill: t.muted,
        "font-size": 14, "font-family": FONT });
      lbl.textContent = v;
      svg.appendChild(lbl);
    }

    // data polygon
    const poly = ordered.map((p, i) => pt(i, p.value).join(",")).join(" ");
    svg.appendChild(el("polygon", { points: poly, fill: rgba(series, t.fillAlpha), stroke: series,
      "stroke-width": 3, "stroke-linejoin": "round" }));

    // vertices + score number just outside each point
    ordered.forEach((p, i) => {
      const a = angle(i);
      const [x, y] = pt(i, p.value);
      svg.appendChild(el("circle", { cx: x, cy: y, r: 6.5, fill: t.surface,
        stroke: series, "stroke-width": 3 }));
      const lx = x + 24 * Math.cos(a), ly = y + 24 * Math.sin(a);
      const num = el("text", { x: lx, y: ly + 7, "text-anchor": "middle",
        fill: t.ink, "font-size": 21, "font-weight": "bold", "font-family": FONT,
        stroke: "#ffffff", "stroke-width": 5, "paint-order": "stroke" });
      num.textContent = p.value;
      svg.appendChild(num);
    });

    // pillar labels (name wrapped onto lines + bold value) — ink tokens, never series color
    const wrapName = (str, max = 11) => {
      const lines = [];
      let cur = "";
      for (const w of str.split(/\s+/)) {
        if (cur && (cur + " " + w).length > max) { lines.push(cur); cur = w; }
        else cur = cur ? cur + " " + w : w;
      }
      if (cur) lines.push(cur);
      return lines;
    };
    const LH = 27; // line height for the 22px label font
    ordered.forEach((p, i) => {
      const a = angle(i);
      const x = CX + LABEL_R * Math.cos(a), y = CY + LABEL_R * Math.sin(a);
      const cos = Math.cos(a), sin = Math.sin(a);
      const anchor = Math.abs(cos) < 0.3 ? "middle" : cos > 0 ? "start" : "end";
      const lines = wrapName(p.name);
      // anchor the block so it grows away from the chart: down when below,
      // up when above, vertically centered at the sides
      let startDy;
      if (sin > 0.85) startDy = 22;
      else if (sin < -0.85) startDy = -12 - (lines.length - 1) * LH;
      else startDy = 7 - ((lines.length - 1) * LH) / 2;
      const g = el("text", { x, y: y + startDy, "text-anchor": anchor, fill: t.ink,
        "font-size": 22, "font-family": FONT });
      lines.forEach((ln, li) => {
        const ts = el("tspan", { x, dy: li === 0 ? 0 : LH });
        ts.textContent = ln;
        g.appendChild(ts);
      });
      svg.appendChild(g);
    });

    const avg = state.pillars.reduce((s, p) => s + p.value, 0) / N;
    document.getElementById("avg").textContent = avg.toFixed(1) + "/5";
  }

  // ---------- pillar list ----------
  function renderList() {
    const list = document.getElementById("pillar-list");
    list.textContent = "";
    state.pillars.forEach((p, i) => {
      const li = document.createElement("li");
      const isFixed = i < FIXED.length;

      let nameEl;
      if (isFixed) {
        nameEl = document.createElement("span");
        nameEl.className = "name";
        nameEl.textContent = p.name;
      } else {
        nameEl = document.createElement("input");
        nameEl.className = "name";
        nameEl.value = p.name;
        nameEl.maxLength = 24;
        nameEl.placeholder = "pillar name";
        nameEl.setAttribute("aria-label", "Pillar " + (i + 1) + " name");
        nameEl.addEventListener("input", () => {
          p.name = nameEl.value || "Pillar";
          renderChart(); persist();
        });
      }

      // heart rating: click the nth heart to set; click the current one to clear
      const hearts = document.createElement("div");
      hearts.className = "hearts";
      hearts.setAttribute("role", "radiogroup");
      hearts.setAttribute("aria-label", p.name + " score");
      const HEART_PATH = "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z";
      for (let n = 1; n <= MAX_VAL; n++) {
        const hrt = document.createElement("button");
        hrt.className = "hrt";
        hrt.innerHTML = '<svg viewBox="0 0 24 24" fill="' + (n <= p.value ? state.color : "none") +
          '" stroke="#43301f" stroke-width="2" stroke-linejoin="round"><path d="' + HEART_PATH + '"/></svg>';
        hrt.setAttribute("aria-label", p.name + ": " + n + " of " + MAX_VAL);
        hrt.setAttribute("role", "radio");
        hrt.setAttribute("aria-checked", String(n === p.value));
        hrt.addEventListener("click", () => {
          p.value = (p.value === n) ? 0 : n;
          renderList(); persist();
        });
        hearts.appendChild(hrt);
      }

      li.append(nameEl, hearts);
      if (isFixed) {
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        li.appendChild(spacer);
      } else {
        const rm = document.createElement("button");
        rm.className = "pcbtn rm";
        rm.textContent = "×";
        rm.setAttribute("aria-label", "Remove " + p.name);
        rm.addEventListener("click", () => {
          state.pillars.splice(i, 1);
          renderList(); persist();
        });
        li.appendChild(rm);
      }
      list.appendChild(li);
    });
    document.getElementById("add-pillar").disabled = state.pillars.length >= MAX_PILLARS;
    renderChart();
  }

  // ---------- drag the wheel — snaps to whole hearts ----------
  let dragging = -1;
  let viewOrder = []; // chart-order pillar refs, set by renderChart
  function svgPoint(evt) {
    const p = new DOMPoint(evt.clientX, evt.clientY);
    return p.matrixTransform(svg.getScreenCTM().inverse());
  }
  function nearestSpoke(evt) {
    const q = svgPoint(evt);
    const a = Math.atan2(q.y - CY, q.x - CX);
    let best = 0, bd = Infinity;
    for (let i = 0; i < state.pillars.length; i++) {
      let d = Math.abs(a - angle(i));
      d = Math.min(d, 2 * Math.PI - d);
      if (d < bd) { bd = d; best = i; }
    }
    return best;
  }
  function dragValue(evt) {
    const q = svgPoint(evt), a = angle(dragging);
    const v = ((q.x - CX) * Math.cos(a) + (q.y - CY) * Math.sin(a)) / R * MAX_VAL;
    const snapped = Math.round(Math.min(MAX_VAL, Math.max(0, v)));
    if (viewOrder[dragging].value !== snapped) {
      viewOrder[dragging].value = snapped;
      renderList(); // hearts follow the drag
    }
  }
  // a drag may only start ON the drawn shape: near one of its points, or
  // inside the polygon itself — clicks anywhere else change nothing
  function onShape(q) {
    const n = viewOrder.length;
    for (let i = 0; i < n; i++) {
      const [vx, vy] = pt(i, viewOrder[i].value);
      if (Math.hypot(q.x - vx, q.y - vy) < 22) return true; // grab a vertex
    }
    let inside = false; // ray-cast against the polygon
    for (let i = 0, j = n - 1; i < n; j = i++) {
      const [xi, yi] = pt(i, viewOrder[i].value);
      const [xj, yj] = pt(j, viewOrder[j].value);
      if ((yi > q.y) !== (yj > q.y) && q.x < (xj - xi) * (q.y - yi) / (yj - yi) + xi) inside = !inside;
    }
    return inside;
  }
  svg.addEventListener("pointerdown", evt => {
    const q = svgPoint(evt);
    if (!onShape(q)) return;
    dragging = nearestSpoke(evt);
    svg.setPointerCapture(evt.pointerId);
    dragValue(evt);
    evt.preventDefault();
  });
  svg.addEventListener("pointermove", evt => { if (dragging >= 0) dragValue(evt); });
  const endDrag = () => { if (dragging >= 0) { dragging = -1; persist(); } };
  svg.addEventListener("pointerup", endDrag);
  svg.addEventListener("pointercancel", endDrag);

  document.getElementById("add-pillar").addEventListener("click", () => {
    if (state.pillars.length >= MAX_PILLARS) return;
    state.pillars.push({ name: "Pillar", value: 3 });
    renderList(); persist();
    const inputs = document.querySelectorAll("#pillar-list input.name");
    const last = inputs[inputs.length - 1];
    last.focus(); last.select();
  });

  // ---------- retro datetime + location stamp ----------
  // starts as the timezone city, upgrades to the real city once
  // geolocation is granted and reverse-geocoded
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || "");
  let city = tz.includes("/") ? tz.split("/").pop().replace(/_/g, " ") : tz;

  function stampText() {
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    let h = now.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    const date = pad(now.getMonth() + 1) + "/" + pad(now.getDate()) + "/" + now.getFullYear();
    const time = pad(h) + ":" + pad(now.getMinutes()) + " " + ampm;
    return date + " " + time + (city ? " · " + city : "");
  }
  const stampEl = document.getElementById("stamp");
  const renderStamp = () => {
    stampEl.innerHTML = '<span class="heart">♥</span> ' + stampText() + ' <span class="heart">♥</span>';
  };
  renderStamp();
  setInterval(renderStamp, 30000);

  (function locate() {
    try {
      const cached = localStorage.getItem("ww-city");
      if (cached) { city = cached; renderStamp(); }
    } catch (e) {}
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const r = await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" +
          pos.coords.latitude + "&longitude=" + pos.coords.longitude + "&localityLanguage=en");
        const j = await r.json();
        // prefer locality (borough/neighborhood, e.g. "Brooklyn") over the
        // broader city ("New York")
        const c = j.locality || j.city || j.principalSubdivision;
        if (c) {
          city = c;
          try { localStorage.setItem("ww-city", c); } catch (e) {}
          renderStamp();
        }
      } catch (e) { /* offline or API down — keep the fallback */ }
    }, () => { /* denied — keep the timezone fallback */ }, { timeout: 8000, maximumAge: 3600000 });
  })();

  // ---------- title & color ----------
  const titleInput = document.getElementById("title-input");
  titleInput.value = state.title;
  titleInput.addEventListener("input", () => { state.title = titleInput.value; persist(); });

  function renderSwatches() {
    const box = document.getElementById("swatches");
    box.textContent = "";
    for (const c of SWATCHES) {
      const b = document.createElement("button");
      b.className = "swatch" + (state.color === c ? " sel" : "");
      b.style.background = c;
      b.setAttribute("role", "radio");
      b.setAttribute("aria-checked", String(state.color === c));
      b.setAttribute("aria-label", "Chart color " + c);
      b.addEventListener("click", () => {
        state.color = c;
        renderSwatches(); renderList(); persist(); // list too — hearts wear the chart color
      });
      box.appendChild(b);
    }
    document.getElementById("save").style.background = state.color; // save button wears it too
  }

  // ---------- actions ----------
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  const shareBtn = document.getElementById("share");
  if (navigator.share) {
    shareBtn.hidden = false;
    shareBtn.addEventListener("click", () => {
      persist();
      navigator.share({ title: state.title || "Wellness", url: location.href }).catch(() => {});
    });
  }

  // PNG export: the whole chart window — title bar, cream frame, chart, retro stamp
  function downloadBlob(blob, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }
  const slug = () => (state.title || "wellness").toLowerCase().replace(/[^a-z0-9]+/g, "-");

  function windowPNG(stampStr, done) {
    const SCALE = 2, SVG_W = 840, SVG_H = 640;
    const TB = 48, PAD = 18, PNL = 10, SBH = 38, GAP = 14;
    const panelW = SVG_W + PNL * 2, panelH = SVG_H + PNL * 2;
    const W = SVG_W + (PAD + PNL) * 2;
    const sbY = TB + PAD + panelH + GAP;
    const H = sbY + SBH + PAD;
    const BROWN = "#43301f", CREAM = "#f6efdd", CREAM2 = "#fffbf0", PINK = "#ef9aa9", HEART = "#d94f2b";

    const clone = svg.cloneNode(true);
    clone.setAttribute("width", SVG_W); clone.setAttribute("height", SVG_H);
    clone.setAttribute("xmlns", NS);
    const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = W * SCALE;
      canvas.height = H * SCALE;
      const ctx = canvas.getContext("2d");
      ctx.scale(SCALE, SCALE);

      // window body + clipped title bar
      ctx.beginPath(); ctx.roundRect(1.5, 1.5, W - 3, H - 3, 10);
      ctx.fillStyle = CREAM; ctx.fill();
      ctx.save(); ctx.clip();
      ctx.fillStyle = PINK; ctx.fillRect(0, 0, W, TB);
      ctx.fillStyle = BROWN; ctx.fillRect(0, TB - 2, W, 2);
      ctx.restore();
      ctx.lineWidth = 3; ctx.strokeStyle = BROWN;
      ctx.beginPath(); ctx.roundRect(1.5, 1.5, W - 3, H - 3, 10); ctx.stroke();

      // title bar text
      ctx.textBaseline = "middle";
      ctx.font = "bold 18px 'Courier New', monospace";
      ctx.textAlign = "left";
      ctx.fillStyle = HEART; ctx.fillText("♥", PAD, TB / 2 + 1);
      ctx.fillStyle = BROWN; ctx.fillText(state.title || "Wellness", PAD + 26, TB / 2 + 1);
      ctx.textAlign = "right"; ctx.fillText("–  □  ×", W - PAD, TB / 2 + 1);

      // white canvas panel + chart
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(PAD + 1, TB + PAD + 1, panelW - 2, panelH - 2, 6);
      ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.stroke();
      ctx.drawImage(img, PAD + PNL, TB + PAD + PNL, SVG_W, SVG_H);

      // status bar: retro datetime + location stamp
      ctx.beginPath(); ctx.roundRect(PAD + 1, sbY, panelW - 2, SBH, 6);
      ctx.fillStyle = CREAM2; ctx.fill(); ctx.stroke();
      ctx.font = "bold 16px 'Courier New', monospace";
      ctx.textAlign = "left";
      const stamp = " " + stampStr + " ";
      const wTxt = ctx.measureText(stamp).width;
      const wHrt = ctx.measureText("♥").width;
      let sx = (W - (wTxt + wHrt * 2)) / 2;
      const midY = sbY + SBH / 2 + 1;
      ctx.fillStyle = HEART; ctx.fillText("♥", sx, midY); sx += wHrt;
      ctx.fillStyle = BROWN; ctx.fillText(stamp, sx, midY); sx += wTxt;
      ctx.fillStyle = HEART; ctx.fillText("♥", sx, midY);

      URL.revokeObjectURL(url);
      canvas.toBlob(done, "image/png");
    };
    img.src = url;
  }

  document.getElementById("download").addEventListener("click", () => {
    windowPNG(stampText(), png => downloadBlob(png, slug() + ".png"));
  });

  // ---------- save: screenshot + CSV record committed to GitHub over the web ----------
  // Files land in the PRIVATE repo below (this site's repo is public, wellness
  // data shouldn't be). Needs a fine-grained personal access token, asked for
  // once and kept in this browser's localStorage.
  const GH_REPO = "subiqian/wellness-saves";
  const TOKEN_KEY = "ww-gh-token";
  const LOG_KEY = "wellness-wheel-log";

  function ghToken() {
    let t = null;
    try { t = localStorage.getItem(TOKEN_KEY); } catch (e) {}
    if (!t) {
      t = prompt("To save to github.com/" + GH_REPO + ", paste a GitHub token.\n\n" +
        "Make one at github.com → Settings → Developer settings → " +
        "Fine-grained tokens: select only the wellness-saves repo, " +
        "permission Contents = Read and write.\n\n(Stored only in this browser.)");
      if (t) {
        t = t.trim();
        try { localStorage.setItem(TOKEN_KEY, t); } catch (e) {}
      }
    }
    return t;
  }
  async function ghApi(path, opts) {
    const t = ghToken();
    if (!t) throw new Error("no token");
    const r = await fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + path, {
      method: (opts && opts.method) || "GET",
      body: (opts && opts.body) || undefined,
      headers: { Authorization: "Bearer " + t, Accept: "application/vnd.github+json" }
    });
    if (r.status === 401 || r.status === 403) {
      try { localStorage.removeItem(TOKEN_KEY); } catch (e) {} // bad token — ask again next save
      throw new Error("auth");
    }
    return r;
  }
  const bytesToB64 = bytes => {
    const arr = new Uint8Array(bytes);
    let s = "";
    for (let i = 0; i < arr.length; i += 0x8000) s += String.fromCharCode.apply(null, arr.subarray(i, i + 0x8000));
    return btoa(s);
  };
  const b64ToText = b64 => new TextDecoder().decode(Uint8Array.from(atob(b64.replace(/\s/g, "")), c => c.charCodeAt(0)));
  async function ghPut(path, contentB64, message, sha) {
    const body = { message, content: contentB64 };
    if (sha) body.sha = sha;
    const r = await ghApi(path, { method: "PUT", body: JSON.stringify(body) });
    if (!r.ok) throw new Error("put " + r.status);
  }

  document.getElementById("save").addEventListener("click", () => {
    const full = stampText(); // frozen once — screenshot and CSV share this exact stamp
    const [datetime, loc] = full.split(" · ");
    const overall = (state.pillars.reduce((s, p) => s + p.value, 0) / state.pillars.length).toFixed(1);
    const byName = n => { const p = state.pillars.find(x => x.name === n); return p ? p.value : ""; };
    const extras = state.pillars.slice(FIXED.length).map(p => p.name + "=" + p.value).join("; ");
    const row = [datetime, loc || "", state.title, state.color, overall, ...FIXED.map(byName), extras];

    let log = [];
    try { log = JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch (e) {}
    log.push(row);
    try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); } catch (e) {}

    const esc = v => '"' + String(v).replace(/"/g, '""') + '"';
    const header = ["datetime", "location", "title", "color", "overall",
      ...FIXED.map(n => n.toLowerCase().replace(/ /g, "_")), "extra_pillars"];
    const csv = [header, ...log].map(r => r.map(esc).join(",")).join("\r\n");
    const csvBlob = new Blob([csv], { type: "text/csv" });
    const pngName = slug() + "-" + datetime.replace(/\//g, "-").replace(/:/g, "").replace(/ /g, "_") + ".png";

    windowPNG(full, async png => {
      try {
        // the CSV in the repo is the source of truth: fetch, append, commit
        const esc2 = v => '"' + String(v).replace(/"/g, '""') + '"';
        let csvText = header.map(esc2).join(",") + "\r\n";
        let sha;
        const g = await ghApi("wellness-log.csv");
        if (g.ok) {
          const j = await g.json();
          sha = j.sha;
          csvText = b64ToText(j.content);
          if (!/\r?\n$/.test(csvText)) csvText += "\r\n";
        }
        csvText += row.map(esc2).join(",") + "\r\n";
        await ghPut("wellness-log.csv", bytesToB64(new TextEncoder().encode(csvText)), "log: " + datetime, sha);
        await ghPut("shots/" + pngName, bytesToB64(await png.arrayBuffer()), "shot: " + datetime);
        toast("Your wellness state has been saved! ♥");
      } catch (e) {
        // no token / auth / offline — hand over the files instead
        downloadBlob(png, pngName);
        downloadBlob(csvBlob, "wellness-log.csv");
        toast("Your wellness state has been saved! ♥ (downloaded)");
      }
    });
  });

  document.getElementById("reset").addEventListener("click", () => {
    state = defaults();
    titleInput.value = "";
    renderSwatches(); renderList(); persist();
    toast("reset ♥");
  });

  // ---------- go ----------
  renderSwatches();
  renderList();
  persist();
})();
</script>
</body>
</html>
